name: Audit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit:
    runs-on: macos-latest
    env:
      CASK_PATH: Casks/oxideterm.rb
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Tap local repository
        run: |
          set -euo pipefail

          brew tap --custom-remote AnalyseDeCircuit/tap "$GITHUB_WORKSPACE"

          # Homebrew clones the tap from Git, so copy the checked-out cask file
          # into the tap directory to ensure pull request changes are audited.
          tap_path="$(brew --repo AnalyseDeCircuit/tap)"
          cp "$GITHUB_WORKSPACE/$CASK_PATH" "$tap_path/$CASK_PATH"

      - name: Style cask
        run: brew style --cask AnalyseDeCircuit/tap/oxideterm

      - name: Audit cask
        run: brew audit --cask --online AnalyseDeCircuit/tap/oxideterm
